<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" fill="none">
  <!-- ============================================
       VERTEX CONSULT — Official Company Logo
       Faithful SVG recreation of the brand mark
       V + house/building integration at apex
       Colors: Charcoal #3a3a3a / Taupe-Gold #b0967a
       ============================================ -->

  <!-- === V-MARK WITH INTEGRATED BUILDING === -->
  <g transform="translate(250,0)">

    <!-- Left arm of V — dark charcoal -->
    <polygon points="-150,160 -100,160 -8,410 -8,320 -40,320 -50,270 -60,260 -72,245 -82,230"
             fill="#3a3a3a"/>
    <polygon points="-150,160 -170,160 -30,450 -8,450 -8,410 -100,160"
             fill="#3a3a3a"/>

    <!-- Right arm of V — taupe / gold -->
    <polygon points="150,160 100,160 8,410 8,320 40,320 50,270 60,260 72,245 82,230"
             fill="#b0967a"/>
    <polygon points="150,160 170,160 30,450 8,450 8,410 100,160"
             fill="#b0967a"/>

    <!-- House / building body (white fill) -->
    <polygon points="0,128 -52,220 -38,220 -38,310 38,310 38,220 52,220"
             fill="#ffffff"/>

    <!-- Window: 4 panes arranged in a grid -->
    <rect x="-14" y="240" width="10" height="10" fill="#3a3a3a" rx="1"/>
    <rect x="4" y="240" width="10" height="10" fill="#3a3a3a" rx="1"/>
    <rect x="-14" y="258" width="10" height="10" fill="#3a3a3a" rx="1"/>
    <rect x="4" y="258" width="10" height="10" fill="#3a3a3a" rx="1"/>

  </g>

  <!-- === WORDMARK === -->

  <!-- VERTEX -->
  <text x="250" y="515" text-anchor="middle"
        font-family="'Inter','Helvetica Neue','Segoe UI',Arial,sans-serif"
        font-size="56" font-weight="300" letter-spacing="18"
        fill="#3a3a3a">VERTEX</text>

  <!-- Flanking lines + CONSULT -->
  <line x1="110" y1="548" x2="185" y2="548" stroke="#b0967a" stroke-width="1.2"/>
  <text x="250" y="556" text-anchor="middle"
        font-family="'Inter','Helvetica Neue','Segoe UI',Arial,sans-serif"
        font-size="24" font-weight="400" letter-spacing="14"
        fill="#b0967a">CONSULT</text>
  <line x1="315" y1="548" x2="390" y2="548" stroke="#b0967a" stroke-width="1.2"/>

</svg>