<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Vertex Consult Logo">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0bf85"/>
      <stop offset="50%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#a8894f"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect x="8" y="8" width="224" height="224" rx="28" ry="28" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="1.5"/>

  <!-- Thin inner decorative frame -->
  <rect x="20" y="20" width="200" height="200" rx="20" ry="20" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>

  <!-- Architectural triangle/vertex symbol (Apex of a building) -->
  <g filter="url(#glow)">
    <!-- Stepped building silhouette forming a V -->
    <polygon points="120,48 180,186 156,186 144,148 96,148 84,186 60,186"
             fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linejoin="round"/>
    <!-- Apex accent diamond -->
    <polygon points="120,60 127,72 120,84 113,72" fill="url(#goldGrad)"/>
    <!-- Horizontal floor lines -->
    <line x1="72" y1="110" x2="168" y2="110" stroke="#c9a96e" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="130" x2="160" y2="130" stroke="#c9a96e" stroke-width="1" opacity="0.4"/>
    <line x1="88" y1="150" x2="152" y2="150" stroke="#c9a96e" stroke-width="1" opacity="0.3"/>
    <line x1="96" y1="170" x2="144" y2="170" stroke="#c9a96e" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Brand wordmark -->
  <text x="120" y="208" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="22" font-weight="700" letter-spacing="6"
        fill="url(#goldGrad)">VERTEX</text>
</svg>
